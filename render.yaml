services:
  - type: web
    name: run-tracker
    runtime: php
    plan: free
    buildCommand: composer install --no-dev && npm install && npm run build
    startCommand: apachectl start
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true