services:
  - type: web
    name: run-tracker
    runtime: php
    plan: free
    buildCommand: "composer install --no-dev --optimize-autoloader && npm install && npm run build"
    # แก้ StartCommand ให้รันคำสั่งที่ถูกต้องสำหรับ Laravel บน Render
    startCommand: "php artisan migrate --force && CADDY_PORT=$PORT caddy run --config Caddyfile"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      # อย่าลืมใส่ตัวแปรฐานข้อมูลที่จำเป็นทั้งหมดไว้ตรงนี้ด้วยนะครับ!